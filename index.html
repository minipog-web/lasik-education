    <!-- Conversion & Analytics Event Tracking -->
    <script>
      (function() {
        // 1. Intercept Fetch Submissions (Netlify Forms)
        var originalFetch = window.fetch;
        window.fetch = function() {
          var args = arguments;
          var url = args[0];
          var options = args[1];
          if (url === '/' && options && options.method === 'POST' && typeof options.body === 'string' && options.body.indexOf('form-name=consultation') !== -1) {
            window.dataLayer.push({
              event: 'form_submission',
              form_name: 'consultation',
              location: getParam(options.body, 'location') || 'Livingston',
              preferred_contact: getParam(options.body, 'preferred_contact') || 'email'
            });
          }
          return originalFetch.apply(this, args);
        };

        function getParam(body, key) {
          var match = new RegExp('(?:^|&)' + key + '=([^&]*)').exec(body);
          return match ? decodeURIComponent(match[1].replace(/\+/g, ' ')) : null;
        }

        // 2. Track Interactions (Click-to-Call and CTA buttons)
        document.addEventListener('click', function(e) {
          var target = e.target;
          while (target && target !== document.body) {
            // Click to Call Tracking
            if (target.tagName === 'A' && target.href && target.href.indexOf('tel:') === 0) {
              window.dataLayer.push({
                event: 'phone_click',
                phone_number: target.href.replace('tel:', '')
              });
              break;
            }
            // CTA Button Tracking
            if (target.tagName === 'BUTTON' || (target.className && typeof target.className === 'string' && target.className.indexOf('btn') !== -1)) {
              var btnText = target.innerText || target.textContent || '';
              btnText = btnText.trim().replace(/\s+/g, ' ');
              if (btnText) {
                window.dataLayer.push({
                  event: 'cta_click',
                  cta_label: btnText
                });
              }
              break;
            }
            target = target.parentNode;
          }
        }, true);

        // 3. Quiz Completion Tracking (DOM Mutation Monitoring)
        var quizCompletedSent = false;
        var observer = new MutationObserver(function() {
          if (quizCompletedSent) return;
          var rootEl = document.getElementById('root');
          if (!rootEl) return;
          
          // Check for quiz results indicator
          var resultsHeader = rootEl.querySelector('h3');
          if (resultsHeader) {
            var text = (resultsHeader.innerText || resultsHeader.textContent || '').trim();
            if (text === 'Initial Biometrics Approved' || text === 'Assessment Report Prepared') {
              quizCompletedSent = true;
              window.dataLayer.push({
                event: 'quiz_complete',
                quiz_result: text === 'Initial Biometrics Approved' ? 'eligible' : 'review'
              });
            }
          }
        });

        window.addEventListener('load', function() {
          var rootEl = document.getElementById('root') || document.body;
          observer.observe(rootEl, {
            childList: true,
            subtree: true
          });
        });
      })();
    </script>

  <script>
    // ─── Citation System ─────────────────────────────────────────────────────

    var supStyle = 'display:inline-block;font-size:0.6em;font-weight:700;vertical-align:super;line-height:1;color:#e2b857;margin-left:2px;cursor:pointer;text-decoration:none;font-family:Inter,system-ui,sans-serif;opacity:0.85;';

    var citationMap = [
      { text: 'FDA approved LASIK is typically for individuals 18 and older whose eyes have finished growing.', refs: [1] },
      { text: 'quadrillionth of a second', refs: [4] },
      { text: 'microscopic carbon dioxide/water gas bubbles', refs: [4] },
      { text: 'thickness of a human hair', refs: [4] },
      { text: 'cold excimer laser', refs: [6] },
      { text: 'cool ultraviolet light', refs: [6] },
      { text: 'natural osmotic pressure', refs: [5] },
      { text: 'cellular adhesion', refs: [5] },
      { text: '24 to 48 hours', refs: [5] },
      { text: 're-epithelialization', refs: [5] },
      { text: 'tear film reduction', refs: [8] },
      { text: 'night glare, halos', refs: [7] },
      { text: 'LASIK is a surgical procedure', refs: [9] },
      { text: 'Radial Keratotomy (RK) relied on diamond scalpels', refs: [9] },
      { text: '193 nm ultraviolet excimer lasers', refs: [6] },
      { text: 'breaking carbon-carbon collagen bonds', refs: [6] },
      { text: '6.4 electron-volts (eV) of energy', refs: [6] },
      { text: '1053 nm infrared Femtosecond Laser', refs: [4] },
      { text: 'femtosecond laser operates at a near-infrared wavelength', refs: [4] },
      { text: 'thermal collateral damage', refs: [6] },
      { text: 'Wavefront-Guided Excimer Laser', refs: [2, 10] }
    ];

    // Marker attribute placed directly on the anchor links themselves, NOT on parent
    var LINK_ATTR = 'data-cite-link';

    function makeSupLink(num) {
      var a = document.createElement('a');
      a.href = '#lasik-citations';
      a.setAttribute('style', supStyle);
      a.setAttribute('aria-label', 'Reference ' + num);
      a.setAttribute(LINK_ATTR, '1');
      a.textContent = '[' + num + ']';
      return a;
    }

    function injectInto(rootEl) {
      var walker = document.createTreeWalker(rootEl, NodeFilter.SHOW_TEXT, null, false);
      var nodes = [];
      var n;
      while ((n = walker.nextNode())) nodes.push(n);

      nodes.forEach(function(node) {
        var par = node.parentNode;
        if (!par) return;

        var tag = (par.tagName || '').toUpperCase();
        if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'A' || tag === 'SUP') return;

        var text = node.nodeValue;
        if (!text || text.trim().length < 8) return;

        // Skip citation injection inside the quiz container to prevent React DOM reconciliation bugs
        var current = par;
        var insideQuiz = false;
        while (current) {
          if (current.id === 'quiz' || (current.className && typeof current.className === 'string' && current.className.indexOf('quiz') !== -1)) {
            insideQuiz = true;
            break;
          }
          current = current.parentNode;
        }
        if (insideQuiz) return;

        for (var i = 0; i < citationMap.length; i++) {
          var entry = citationMap[i];
          var pos = text.indexOf(entry.text);
          if (pos === -1) continue;

          // Check if parent already has this specific citation link to prevent infinite duplication
          var alreadyCited = Array.from(par.querySelectorAll('a[' + LINK_ATTR + ']')).some(function(lnk) {
            return entry.refs.some(function(num) {
              return lnk.textContent === '[' + num + ']';
            });
          });
          if (alreadyCited) continue;

          var end = pos + entry.text.length;

          // Split: [text before+phrase] | [superscripts] | [text after]
          var before = document.createTextNode(text.substring(0, end));
          var after  = document.createTextNode(text.substring(end));

          par.insertBefore(before, node);
          entry.refs.forEach(function(num) {
            par.insertBefore(makeSupLink(num), node);
          });
          par.insertBefore(after, node);
          par.removeChild(node);
          break; // Process one match per text node. Subsequent mutations will handle others if any.
        }
      });
    }

    // ─── References Footer ───────────────────────────────────────────────────

    function buildFooter() {
      if (document.getElementById('lasik-citations')) return;

      var wrap = document.createElement('div');
      wrap.id = 'lasik-citations';
      wrap.setAttribute('style', 'font-family:Inter,system-ui,sans-serif;background:#050505;border-top:1px solid rgba(255,255,255,0.06);padding:48px 32px 64px;color:#64748b;box-sizing:border-box;');

      var inner = document.createElement('div');
      inner.setAttribute('style', 'max-width:900px;margin:0 auto;');

      var heading = document.createElement('h3');
      heading.setAttribute('style', 'font-size:0.67rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#475569;margin:0 0 20px 0;font-family:inherit;');
      heading.textContent = 'References & Citations';

      var refs = [
        ['1',  'U.S. Food & Drug Administration.',
               'What is LASIK?',
               'https://www.fda.gov/medical-devices/surgery-devices/lasik',
               'fda.gov \u2192 What is LASIK?'],
        ['2',  'U.S. Food & Drug Administration.',
               'LASIK Quality of Life Collaboration Project (PROWL Studies).',
               'https://www.fda.gov/medical-devices/lasik/lasik-quality-life-collaboration-project',
               'fda.gov \u2192 PROWL Studies'],
        ['3',  'Solomon KD, et al.',
               'LASIK World Literature Review: Quality of Life and Patient Satisfaction. Ophthalmology. 2009;116(4):691\u2013701. [Overall satisfaction: 95.4%]',
               'https://pubmed.ncbi.nlm.nih.gov/19344821/',
               'PubMed 19344821'],
        ['4',  'Moshirfar M, et al.',
               'Femtosecond Laser Refractive Surgery: A Review of Current Concepts. Clinical Ophthalmology. 2021;15:3219\u20133230.',
               'https://pubmed.ncbi.nlm.nih.gov/34526740/',
               'PubMed 34526740'],
        ['5',  'Dupps WJ & Wilson SE.',
               'Biomechanics and wound healing in the cornea. Exp Eye Res. 2006;83(4):709\u2013720. [Flap adhesion & 24\u201348h epithelial sealing.]',
               'https://pubmed.ncbi.nlm.nih.gov/16797553/',
               'PubMed 16797553'],
        ['6',  'Bower KS, et al.',
               'Excimer laser refractive surgery: principles and current technology. Curr Opin Ophthalmol. 2001;12(4):264\u2013270. [193 nm UV, nanosecond pulses.]',
               'https://pubmed.ncbi.nlm.nih.gov/11224726/',
               'PubMed 11224726'],
        ['7',  'American Academy of Ophthalmology.',
               'LASIK \u2014 Laser Eye Surgery Overview.',
               'https://www.aao.org/eye-health/treatments/lasik-overview',
               'aao.org \u2192 LASIK Overview'],
        ['8',  'Shoja MR, et al.',
               'Incidence of dry eye after LASIK. Cornea. 2007;26(6):646\u2013650.',
               'https://pubmed.ncbi.nlm.nih.gov/17592310/',
               'PubMed 17592310'],
        ['9',  'U.S. National Library of Medicine / StatPearls.',
               'LASIK Surgery. NCBI Bookshelf.',
               'https://www.ncbi.nlm.nih.gov/books/NBK470564/',
               'ncbi.nlm.nih.gov/books/NBK470564'],
        ['10', 'American Society of Cataract & Refractive Surgery (ASCRS).',
               'Clinical guidelines on LASIK candidacy.',
               'https://www.ascrs.org',
               'ascrs.org']
      ];

      var ol = document.createElement('ol');
      ol.setAttribute('style', 'list-style:decimal;padding-left:22px;display:flex;flex-direction:column;gap:10px;font-size:0.71rem;line-height:1.75;');

      refs.forEach(function(r) {
        var li = document.createElement('li');

        var authorSpan = document.createTextNode(r[1] + ' ');
        var em = document.createElement('em');
        em.textContent = r[2] + ' ';
        var link = document.createElement('a');
        link.href = r[3];
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.setAttribute('style', 'color:#e2b857;text-decoration:none;');
        link.textContent = r[4];

        li.appendChild(authorSpan);
        li.appendChild(em);
        li.appendChild(link);
        ol.appendChild(li);
      });

      var note = document.createElement('p');
      note.setAttribute('style', 'margin-top:18px;font-size:0.64rem;color:#334155;line-height:1.65;');
      note.innerHTML = '<em>All statistical claims reflect aggregate peer-reviewed clinical data. Individual outcomes vary. LASIK is a surgical procedure with inherent benefits and risks; consult a qualified ophthalmologist to determine your candidacy. This resource is for educational purposes only and does not constitute medical advice. Information submitted via forms on this site is handled in strict compliance with HIPAA (Health Insurance Portability and Accountability Act) standards to protect your health privacy. For more information, please read the <a href="https://www.maranoeyecare.com/privacy-policy/" target="_blank" rel="noopener noreferrer" style="color:#e2b857;text-decoration:none;">Marano Eye Care Privacy Policy</a>.<br><br>© 2026 Marano Eye Care. Livingston Clinic: 200 South Orange Ave, Livingston, NJ 07039 | Newark Clinic: 137 Ferry St, Newark, NJ 07105 | Phone: 973-322-0100</em>';

      inner.appendChild(heading);
      inner.appendChild(ol);
      inner.appendChild(note);
      wrap.appendChild(inner);

      var root = document.getElementById('root');
      if (root) root.parentNode.insertBefore(wrap, root.nextSibling);
    }

    // ─── Boot ────────────────────────────────────────────────────────────────

    var _sweepTimer = null;
    function scheduleSweep() {
      clearTimeout(_sweepTimer);
      _sweepTimer = setTimeout(function() {
        injectInto(document.getElementById('root') || document.body);
      }, 100);
    }

    window.addEventListener('load', function() {
      console.log(
        '%c[ Marano Eye Care - Custom Wavefront-Guided Refractive Suite ]\\n%c"Because 20/20 is just the baseline."\\n\\n🔬 Wavefront optical maps compiled successfully.\\n👉 Schedule a tour of our clinical suite: 973-322-0100',
        'color: #e2b857; font-weight: bold; font-size: 1.15rem; font-family: system-ui, sans-serif; line-height: 1.5;',
        'color: #94a3b8; font-style: italic; font-size: 0.95rem; font-family: Georgia, serif; line-height: 1.5;'
      );
      buildFooter();

      // Sweep multiple times early on to capture content rendered progressively by React
      [400, 1000, 2000, 3500, 6000].forEach(function(delay) {
        setTimeout(function() {
          injectInto(document.getElementById('root') || document.body);
        }, delay);
      });

      // Watch for any DOM changes (tab switching, step selections, dynamic content mounts)
      var observer = new MutationObserver(scheduleSweep);
      observer.observe(document.getElementById('root') || document.body, {
        childList: true,
        subtree: true,
        characterData: true
      });
    });
  </script>
